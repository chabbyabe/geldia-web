name: Geldia Web Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Check AUTO_DEPLOY flag
        id: gate
        run: |
          if [ "${{ secrets.AUTO_DEPLOY }}" = "true" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop workflow if deployment is disabled
        if: steps.gate.outputs.deploy != 'true'
        run: |
          echo "🚫 AUTO_DEPLOY is not enabled. Exiting safely."
          exit 0

      - name: Checkout repository
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/checkout@v4

      - name: Deploy via SSH (pull latest code)
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.WORK_DIR }}
            git reset --hard
            git pull origin main

      - name: Setup Node
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.deploy == 'true'
        run: npm install

      - name: Build project
        if: steps.gate.outputs.deploy == 'true'
        env:
          REACT_APP_BASE_URL: ${{ secrets.REACT_APP_BASE_URL }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: |
          CI=false NODE_OPTIONS=--max_old_space_size=4096 npm run build

      - name: Copy build to server
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/"
          target: ${{ secrets.WORK_DIR }}

      - name: Restart server
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod -R 755 ${{ secrets.WORK_DIR }}
            echo "✅ Deployment complete"

      - name: Clean up repository
        if: steps.gate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.WORK_DIR }}
            git reset --hard